<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050403" />
    <title>Pagina nao encontrada - Vanta Creative</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      @font-face {
        font-family: GeneralSansReg;
        src: url(fonts/GeneralSans-Regular.otf);
      }

      @font-face {
        font-family: GeneralSansMed;
        src: url(fonts/GeneralSans-Medium.otf);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: GeneralSansReg, sans-serif;
      }

      body {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        padding: 5vw;
        background: #050403;
        color: white;
      }

      main {
        width: min(100%, 980px);
      }

      h5 {
        margin-bottom: 18px;
        opacity: 0.6;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(72px, 16vw, 220px);
        line-height: 0.86;
        letter-spacing: 0;
        text-transform: uppercase;
        background: linear-gradient(92deg, #f7f2e8 0%, #d8c8b5 42%, #b87333 74%, #f2eee7 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      p {
        max-width: 520px;
        margin: 28px 0;
        color: #c8c8c8;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        padding: 12px 22px;
        border: 1px solid rgba(242, 238, 231, 0.76);
        border-radius: 100px;
        color: white;
        font-size: 12px;
        text-decoration: none;
        transition: background-color 0.5s cubic-bezier(0.19, 1, 0.22, 1), color 0.5s cubic-bezier(0.19, 1, 0.22, 1);
      }

      a:hover,
      a:focus-visible {
        background: #f2eee7;
        color: #050403;
      }
    </style>
  </head>
  <body>
    <main>
      <h5>(404 / Vanta Creative)</h5>
      <h1>Quadro perdido</h1>
      <p>Esta pagina nao faz parte do sistema atual do estudio. Volte para a peca principal do portfolio.</p>
      <a href="index.html">Voltar para o inicio</a>
    </main>
  </body>
</html>
